<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" style="max-width:800px;height:auto;">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0030" />
      <stop offset="50%" stop-color="#2d0a4e" />
      <stop offset="100%" stop-color="#4a0e6b" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0" />
      <stop offset="25%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#c0c0c0" />
      <stop offset="75%" stop-color="#909090" />
      <stop offset="100%" stop-color="#e0e0e0" />
    </linearGradient>
    <linearGradient id="metalSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="embossShadow">
      <feDropShadow dx="4" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="800" height="280" rx="16" fill="url(#bgGrad)"/>

  <rect x="10" y="10" width="780" height="260" rx="12" fill="none" stroke="#4a0e6b" stroke-width="2"/>
  <rect x="14" y="14" width="772" height="252" rx="10" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <circle cx="20" cy="20" r="4" fill="#707070" stroke="#505050" stroke-width="0.5"/>
  <circle cx="780" cy="20" r="4" fill="#707070" stroke="#505050" stroke-width="0.5"/>
  <circle cx="20" cy="260" r="4" fill="#707070" stroke="#505050" stroke-width="0.5"/>
  <circle cx="780" cy="260" r="4" fill="#707070" stroke="#505050" stroke-width="0.5"/>
  <circle cx="400" cy="270" r="3" fill="#707070" stroke="#505050" stroke-width="0.5"/>

  <line x1="50" y1="0" x2="120" y2="280" stroke="#7c3aed" stroke-width="0.5" opacity="0.12"/>
  <line x1="200" y1="0" x2="270" y2="280" stroke="#00f5ff" stroke-width="0.3" opacity="0.08"/>
  <line x1="650" y1="0" x2="720" y2="280" stroke="#7c3aed" stroke-width="0.5" opacity="0.12"/>
  <line x1="680" y1="10" x2="750" y2="270" stroke="#4a0e6b" stroke-width="0.4" opacity="0.15"/>

  <circle cx="120" cy="70" r="2" fill="#00f5ff" opacity="0.5">
    <animate attributeName="cy" values="70;50;70" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="200" r="2.5" fill="#00f5ff" opacity="0.4">
    <animate attributeName="cy" values="200;180;200" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <g>
    <animateTransform attributeName="transform" type="rotate" values="-4,400,115;4,400,115;-4,400,115" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <text x="406" y="135" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="78" font-weight="900" fill="#000" opacity="0.5" filter="url(#embossShadow)">MODEX</text>
    <text x="404" y="133" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="78" font-weight="900" fill="#404040">MODEX</text>
    <text x="402" y="131" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="78" font-weight="900" fill="#707070">MODEX</text>
    <text x="400" y="129" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="78" font-weight="900" fill="#a0a0a0">MODEX</text>
    <text x="398" y="127" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="78" font-weight="900" fill="url(#metalGrad)">MODEX</text>
    <text x="398" y="127" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="78" font-weight="900" fill="url(#metalSheen)"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.5s" repeatCount="indefinite"/></text>
    <rect x="478" y="82" width="60" height="34" rx="17" fill="none" stroke="#00f5ff" stroke-width="2.5" filter="url(#neonGlow)"><animate attributeName="stroke" values="#00f5ff;#7c3aed;#00f5ff" dur="4s" repeatCount="indefinite"/></rect>
    <text x="508" y="104" text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="15" font-weight="900" fill="#00f5ff" filter="url(#neonGlow)">AI<animate attributeName="fill" values="#00f5ff;#7c3aed;#00f5ff" dur="4s" repeatCount="indefinite"/></text>
  </g>

  <text x="400" y="180" text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="15" font-weight="900" fill="#00f5ff" filter="url(#neonGlow)" style="letter-spacing:5px;">AUTONOMOUS AGENTIC WEB UI</text>

  <text x="400" y="212" text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="13" font-weight="700" fill="#c0c0e0" filter="url(#neonGlow)" style="letter-spacing:2px;">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite"/>
    ⚡ Mobile-first · Desktop-ready · One-command deploy ⚡
  </text>

  <rect x="150" y="235" width="500" height="3" rx="1.5" fill="#00f5ff" opacity="0.6" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="width" values="500;380;500" dur="4s" repeatCount="indefinite"/>
  </rect>

  <a href="https://github.com/pasha01118/Modex-Sandbox-">
    <rect x="180" y="250" width="440" height="22" rx="11" fill="#1a0030" stroke="#7c3aed" stroke-width="0.5"/>
    <text x="400" y="265" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#00f5ff" filter="url(#neonGlow)">pasha01118/Modex-Sandbox- · main · v0.1.87</text>
  </a>
</svg>
